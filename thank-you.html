<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | HiltonShoots</title>

    <meta name="robots" content="noindex">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1F1F1F;
            --text-dark: #1F1F1F;
            --text-light: #F5F5F5;
            --btn-teal: #00CFCF;
            --btn-teal-hover: #00a6a6;
            --highlight-rose: #E4BFAF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Takes up the full screen height */
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            color: var(--highlight-rose);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 40px;
            color: #bbb;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: var(--btn-teal);
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            padding: 12px 32px;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: var(--btn-teal-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Thank You!</h1>
    <p>Your message has been sent successfully. I will review your project details and get back to you within 24 hours.</p>
    <a href="index.html" class="btn">Back to Portfolio</a>

</body>
</html>
